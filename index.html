<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITSU_MD SESSION</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: white;
            font-family: 'Segoe UI', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            background: rgba(20, 20, 20, 0.9);
            padding: 40px;
            border-radius: 15px;
            border: 2px solid #ffcc00;
            box-shadow: 0 0 25px #ffcc00;
            width: 90%;
            max-width: 400px;
        }
        .logo {
            width: 130px;
            height: 130px;
            border-radius: 50%;
            border: 3px solid #ffcc00;
            margin-bottom: 20px;
            animation: pulse 2s infinite;
        }
        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 204, 0, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 204, 0, 0); }
        }
        h1 { color: #ffcc00; font-size: 26px; margin-bottom: 10px; text-transform: uppercase; }
        p { color: #aaaaaa; font-size: 14px; margin-bottom: 30px; }
        input {
            width: 100%;
            padding: 12px;
            margin-bottom: 20px;
            background: #1a1a1a;
            border: 1px solid #ffcc00;
            border-radius: 5px;
            color: white;
            font-size: 16px;
            text-align: center;
            box-sizing: border-box;
        }
        button {
            background: #ffcc00;
            color: black;
            border: none;
            padding: 12px 25px;
            border-radius: 5px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 16px;
            transition: 0.3s;
        }
        button:hover { background: #e6b800; transform: scale(1.02); }
        .footer { margin-top: 25px; font-size: 12px; color: #ffcc00; letter-spacing: 1px; }
    </style>
</head>
<body>
<div class="container">
    <img src="https://wallpapercave.com/wp/wp4624461.jpg" alt="ZENITSU_MD" class="logo">
    <h1>ZENITSU_MD</h1>
    <p>Connectez votre compte WhatsApp</p>
    <form action="/pair" method="get">
        <input type="number" name="code" placeholder="243XXXXXXXXX" required>
        <button type="submit">OBTENIR MON CODE</button>
    </form>
    <div class="footer">POWERED BY ZENITSU_MD ⚡</div>
</div>
</body>
</html>
