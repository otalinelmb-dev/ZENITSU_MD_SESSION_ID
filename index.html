<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITSU_MD PANEL</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 0 15px #ffcc00; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ffcc00; background: #111; color: white; text-align: center; }
        button { background: #ffcc00; color: black; border: none; padding: 12px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 95%; margin-top: 10px; }
        #code-res { font-size: 28px; color: #ffcc00; margin: 15px 0; font-weight: bold; min-height: 40px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ZENITSU_MD ⚡</h1>
        <p>Entrez votre numéro (ex: 243...)</p>
        <input type="text" id="phone" placeholder="243XXXXXXXXX">
        <button id="btn-pair">GÉNÉRER LE CODE</button>
        <div id="code-res">...</div>
    </div>

    <script>
        document.getElementById('btn-pair').addEventListener('click', function() {
            const num = document.getElementById('phone').value;
            const resDiv = document.getElementById('code-res');
            
            if(!num) return alert("Entrez un numéro !");
            
            resDiv.innerText = "Chargement...";

            fetch('/pairing?code=' + num)
                .then(response => response.json())
                .then(data => {
                    if(data.code) {
                        resDiv.innerText = data.code;
                    } else {
                        resDiv.innerText = "Erreur : " + (data.error || "Inconnue");
                    }
                })
                .catch(err => {
                    resDiv.innerText = "Erreur de connexion au serveur";
                    console.error(err);
                });
        });
    </script>
</body>
</html>
