<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ZENITSU_MD PANEL</title>
    <style>
        body { background: #0a0a0a; color: white; font-family: sans-serif; text-align: center; padding: 20px; }
        .box { border: 2px solid #ffcc00; padding: 20px; border-radius: 15px; max-width: 400px; margin: auto; box-shadow: 0 0 15px #ffcc00; }
        input { width: 90%; padding: 12px; margin: 10px 0; border-radius: 5px; border: 1px solid #ffcc00; background: #111; color: white; }
        button { background: #ffcc00; color: black; border: none; padding: 12px 20px; border-radius: 5px; font-weight: bold; cursor: pointer; width: 95%; margin-top: 10px; }
        #code-res { font-size: 28px; color: #ffcc00; margin: 15px 0; font-weight: bold; background: #1a1a1a; border-radius: 10px; padding: 5px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>ZENITSU_MD ⚡</h1>
        <p>1. Obtenez votre Pairing Code</p>
        <input type="number" id="phone" placeholder="Ex: 243XXXXXXXXX">
        <button onclick="getPair()">GÉNÉRER LE CODE</button>
        <div id="code-res">...</div>

        <hr style="border: 0.5px solid #333; margin: 25px 0;">

        <p>2. Activez votre Bot</p>
        <input type="text" id="session" placeholder="Collez votre Session ID ici">
        <button onclick="activate()">ACTIVER ZENITSU_MD</button>
    </div>

    <script>
        function getPair() {
            const n = document.getElementById('phone').value;
            fetch('/pairing?code=' + n).then(r => r.json()).then(d => {
                document.getElementById('code-res').innerText = d.code || d.error;
            });
        }
        function activate() {
            const s = document.getElementById('session').value;
            fetch('/activate?session=' + s).then(r => r.text()).then(t => alert(t));
        }
    </script>
</body>
</html>
